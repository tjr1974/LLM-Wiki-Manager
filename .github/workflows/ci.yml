name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements.txt

      - name: Pytest + rollup smoke pipe
        run: |
          make test
          make coord-ci-smoke
